<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentra OS | Official</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background: linear-gradient(135deg,#0f172a,#020617,#0a0f1f);
    color:white;
    overflow-x:hidden;
}

/* Glow background */

body::before{
    content:"";
    position:fixed;
    width:600px;
    height:600px;
    background:radial-gradient(circle,#2563eb55,transparent 70%);
    top:-200px;
    left:-200px;
    animation:move1 12s infinite alternate;
    z-index:-1;
}

body::after{
    content:"";
    position:fixed;
    width:600px;
    height:600px;
    background:radial-gradient(circle,#9333ea55,transparent 70%);
    bottom:-200px;
    right:-200px;
    animation:move2 15s infinite alternate;
    z-index:-1;
}

@keyframes move1{
    from{transform:translate(0,0);}
    to{transform:translate(200px,200px);}
}

@keyframes move2{
    from{transform:translate(0,0);}
    to{transform:translate(-200px,-200px);}
}

nav{
    display:flex;
    justify-content:center;
    padding:20px;
    backdrop-filter: blur(10px);
    background:rgba(255,255,255,0.05);
    border-bottom:1px solid rgba(255,255,255,0.1);
    font-weight:800;
    letter-spacing:3px;
}

/* HERO */

.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* ORTA LOGO */

.center-logo{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
}

.center-logo img{
    width:220px;
    opacity:0.95;
}

/* PANELS */

.side-panel{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:300px;
    padding:40px;
    border-radius:25px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.1);
    transition:.4s;
    text-align:center;
}

.side-panel:hover{
    transform:translateY(-50%) scale(1.05);
    box-shadow:0 0 35px #3b82f655;
}

.left{
    left:80px;
}

.right{
    right:80px;
}

.side-panel h2{
    font-size:22px;
    margin-bottom:20px;
}

.btn{
    padding:12px 30px;
    border:none;
    border-radius:40px;
    cursor:pointer;
    background:linear-gradient(90deg,#3b82f6,#9333ea);
    color:white;
    transition:.3s;
    font-size:14px;
}

.btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 25px #9333ea;
}

/* FEATURES */

.features{
    padding:100px 40px;
    text-align:center;
}

.features h2{
    font-size:40px;
    margin-bottom:60px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
}

.card{
    background:rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    padding:30px;
    border-radius:20px;
    transition:.4s;
    border:1px solid rgba(255,255,255,0.1);
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 0 30px #9333ea44;
}

.card h3{
    margin-bottom:15px;
    font-size:22px;
}

.card p{
    color:#cbd5e1;
    font-size:14px;
}

footer{
    padding:30px;
    text-align:center;
    background:#020617;
    color:#94a3b8;
}

/* Responsive */

@media(max-width:1100px){

    .hero{
        flex-direction:column;
    }

    .side-panel{
        position:relative;
        top:auto;
        transform:none;
        margin:20px auto;
        left:auto;
        right:auto;
    }

    .center-logo{
        position:relative;
        transform:none;
        margin:40px 0;
    }
}

</style>
</head>
<body>

<nav>ZENTRA</nav>

<section class="hero">

    <!-- SOL OS -->
    <div class="side-panel left">
        <h2>Zentra OS</h2>
        <a href="zentra-os.iso" download>
            <button class="btn">Zentra OS İndir</button>
        </a>
    </div>

    <!-- ORTA SADE LOGO -->
    <div class="center-logo">
        <img src="zentra-logo.png" alt="Zentra Logo">
    </div>

    <!-- SAĞ KORUMA -->
    <div class="side-panel right">
        <h2>Zentra Koruma</h2>
        <a href="zentra-koruma.zip" download>
            <button class="btn">Zentra Korumasını İndir</button>
        </a>
    </div>

</section>

<section class="features">
    <h2>4 Katmanlı Koruma Sistemi</h2>
    <div class="grid">
        <div class="card">
            <h3>Kalkan 1</h3>
            <p>Gerçek zamanlı tehdit analizi.</p>
        </div>
        <div class="card">
            <h3>Kalkan 2</h3>
            <p>Gelişmiş ağ güvenlik duvarı.</p>
        </div>
        <div class="card">
            <h3>Kalkan 3</h3>
            <p>Kernel seviyesinde savunma.</p>
        </div>
        <div class="card">
            <h3>Kalkan 4</h3>
            <p>Yapay zeka destekli saldırı önleme.</p>
        </div>
    </div>
</section>

<footer>
    © 2026 Zentra OS. Tüm hakları saklıdır.
</footer>

</body>
</html>
